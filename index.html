<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GARMIN PDO 氣壓迴路圖工具</title>
<style>
:root{--ink:#2C2C2B;--sub:#7D7A75;--bg:#F0EFED;--panel:#FFFFFF;--line:#E6E5E3;--soft:#F9F8F7;--blue:#2783DE;--top:#1b1d21}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
.topbar{background:var(--top);color:#fff;padding:14px 22px 16px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
.brand{font-size:12px;font-weight:400;letter-spacing:6px;color:#cfcfcf}
.brand b{font-weight:400;color:#cfcfcf}
.apptitle{font-size:24px;font-weight:700;letter-spacing:.5px;margin-top:2px}
.apptitle .ver{font-size:13px;font-weight:600;color:#bbb;margin-left:6px}
.subtitle{font-size:12.5px;color:#a9a9a9;margin-top:4px;max-width:760px}
.tabs{display:flex;gap:6px}
.tab{background:transparent;color:#ddd;border:1px solid #3a3d42;padding:7px 14px;font-size:13px;cursor:pointer;border-radius:2px}
.tab.on{background:#fff;color:#111;border-color:#fff;font-weight:700}
.wrap{display:flex;gap:12px;padding:12px;align-items:flex-start}
.side{width:300px;flex:0 0 300px;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:12px;position:sticky;top:8px;max-height:calc(100vh - 20px);overflow:auto}
.main{flex:1;min-width:0}
h3{font-size:13px;font-weight:700;margin:14px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
h3:first-child{margin-top:0}
label.f{display:block;font-size:12px;color:var(--sub);margin:6px 0 2px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;border:1px solid var(--line);border-radius:2px;padding:6px 8px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:1px solid var(--blue)}
.row2{display:flex;gap:8px}.row2>*{flex:1}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 10px;font-size:12.5px;cursor:pointer;border-radius:2px;font-family:inherit}
.btn:hover{background:var(--soft)}
.btn.pri{background:var(--top);color:#fff;border-color:var(--top)}
.btn.on{background:#E5F2FC;border-color:var(--blue);color:#1663a8;font-weight:700}
.btnrow{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.pal{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pi{border:1px solid var(--line);border-radius:2px;background:#fff;cursor:grab;padding:4px 2px 2px;text-align:center;user-select:none}
.pi:hover{background:var(--soft);border-color:#bbb}
.pi svg{display:block;margin:0 auto;pointer-events:none}
.pi .nm{font-size:10.5px;color:var(--ink);line-height:1.2;padding:2px 1px 1px}
.pi .pds{font-size:9px;color:var(--sub);line-height:1.15;padding:0 1px 2px}
.pcat{font-size:11px;color:var(--sub);font-weight:700;margin:10px 0 4px;letter-spacing:1px}
.toolbar{display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:6px 8px;margin-bottom:8px;flex-wrap:wrap}
.toolbar .sp{flex:1}
.canvasbox{background:#fff;border:1px solid var(--line);border-radius:2px;position:relative}
#cv{display:block;width:100%;height:calc(100vh - 210px);min-height:460px;touch-action:none}
.hint{font-size:12px;color:var(--sub);padding:6px 10px;border-top:1px solid var(--line);pointer-events:none}
table.t{width:100%;border-collapse:collapse;background:#fff}
table.t th,table.t td{border:1px solid var(--line);padding:6px 8px;font-size:13px;text-align:left}
table.t th{background:var(--soft);font-weight:700;font-size:12px}
table.t input,table.t select{border:1px solid transparent;background:transparent;padding:4px}
table.t input:hover{border-color:var(--line)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px;margin-bottom:12px}
.metric{display:inline-block;border:1px solid var(--line);border-radius:2px;padding:10px 16px;margin:0 8px 8px 0;background:var(--soft)}
.metric .v{font-size:22px;font-weight:800}.metric .k{font-size:11.5px;color:var(--sub)}
.ok{color:#46A171}.warn{color:#D5803B}.ng{color:#E56458}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:2px;padding:16px;width:min(640px,92vw);max-height:86vh;overflow:auto}
.mbox h4{margin-bottom:10px}
.mbox textarea{height:180px;font-family:monospace;font-size:12px}
.savelist{border:1px solid var(--line);margin-top:6px}
.savelist .it{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid var(--line);font-size:12.5px}
.savelist .it:last-child{border-bottom:0}
.note{font-size:12px;color:var(--sub);margin:4px 0}
.propbox{border:1px solid var(--blue);background:#F4F9FE;border-radius:2px;padding:8px;margin-top:8px}
.propbox h4{font-size:12.5px;margin-bottom:6px}
.acc-it{display:flex;gap:4px;align-items:center;font-size:12px;margin:2px 0}
@media (max-width:900px){.wrap{flex-direction:column}.side{width:100%;flex:auto;position:static;max-height:none}#cv{height:60vh}}
#printbox{display:none}
@page{size:A4 landscape;margin:8mm}
@media print{.topbar,.side,.toolbar,.hint{display:none!important}.wrap{padding:0}.canvasbox{border:none}#cv{height:auto;width:100%}
body.rp>*{display:none!important}body.rp #printbox{display:block!important}body.rp #printbox svg{width:100%;height:auto}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="brand">GARMIN <b>PDO</b></div>
    <div class="apptitle">氣壓迴路圖工具<span class="ver">v1.2</span><!-- build v1.21 --></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="draw">繪圖</button>
    <button class="tab" data-tab="bom">明細表 BOM</button>
    <button class="tab" data-tab="air">耗氣量</button>
  </div>
</div>

<div class="wrap" id="pg-draw">
  <div class="side">
    <h3>圖面資訊</h3>
    <label class="f">設備名稱</label><input type="text" id="m-name" placeholder="例：MGU22 Pre Assembly">
    <div class="row2">
    <div><label class="f">版本</label><input type="text" id="m-ver" placeholder="01"></div></div>
    <div class="row2">
    <div><label class="f">日期</label><input type="date" id="m-date"></div></div>

    <h3>專案存檔 / 讀取</h3>
    <div class="btnrow">
      <button class="btn pri" id="b-save-local">儲存到瀏覽器</button>
      <button class="btn" id="b-save-json">匯出 .json</button>
      <button class="btn" id="b-open-json">開啟 .json</button>
    </div>
    <div class="btnrow">
      <button class="btn" id="b-share">分享連結</button>
      <button class="btn" id="b-paste">貼上匯入</button>
      <button class="btn" id="b-tour">❓ 快速上手</button>
    </div>
    <div class="note">自動暫存已開啟；「儲存到瀏覽器」可存多個命名版本：</div>
    <div class="savelist" id="savelist"></div>
    <input type="file" id="fileopen" accept=".json,application/json" style="display:none">

    <h3>元件庫（點一下或拖曳到畫布）</h3>
    <input type="search" id="pal-q" placeholder="搜尋零件（名稱／分類／說明）" autocomplete="off" style="width:100%;box-sizing:border-box;margin:0 0 8px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px">
    <div id="palette"></div>
    <div id="props"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn" id="b-wire">連線</button>
      <button class="btn" id="b-group">群組框</button>
      <button class="btn" id="b-rot">旋轉</button>
      <button class="btn" id="b-mir">鏡射</button>
      <button class="btn" id="b-del">刪除</button>
      <button class="btn" id="b-undo" title="Ctrl+Z">↺ 上一步</button>
      <button class="btn" id="b-redo" title="Ctrl+Y / Ctrl+Shift+Z">↻ 下一步</button>
      <span class="sp"></span>
      <button class="btn" id="b-png">匯出 PNG</button>
      <button class="btn" id="b-svg">匯出 SVG</button>
      <button class="btn" id="b-print">列印 / PDF</button>
      <span class="sp"></span>
      <button class="btn" id="b-zo">−</button><span id="zl" style="font-size:12px;min-width:44px;text-align:center">100%</span><button class="btn" id="b-zi">＋</button>
      <button class="btn" id="b-fit">適合</button>
    </div>
    <div class="canvasbox">
      <svg id="cv" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="hint" id="hint">雙擊元件輸入品牌/型號/標籤｜Shift+拖曳移動元件｜Shift+點選多選（含管線）→右鍵批次修改｜選線後直接拖曳中段平移｜連線時靠近接點自動鎖點提示｜選取管線可拖曳端點改接｜元件接口靠近自動對接鎖定（點鎖頭解除）｜Ctrl+滾輪縮放｜Delete 刪除、Esc 取消</div>
    </div>
  </div>
</div>

<div class="wrap" id="pg-bom" style="display:none"><div class="main" style="width:100%">
  <div class="card"><h3>元件明細（在此輸入品牌 / 型號，會同步顯示到圖面）</h3>
  <div id="bomwrap"></div>
  <div class="btnrow" style="margin-top:8px"><button class="btn pri" id="b-csv">匯出 BOM CSV</button></div></div>
  <div class="card"><h3>彙總（依型號加總數量）</h3><div id="bomagg"></div>
  <div class="btnrow" style="margin-top:8px"><button class="btn pri" id="b-csv-agg">匯出彙總 CSV</button></div></div>
</div></div>

<div class="wrap" id="pg-air" style="display:none"><div class="main" style="width:100%">
  <div class="card"><h3>耗氣量估算（自圖面帶入氣缸／夾爪，參數可修改）</h3>
  <div class="row2" style="max-width:420px"><div><label class="f">工作壓力（bar 錶壓）</label><input type="number" id="air-p" value="5" step="0.5"></div><div></div></div>
  <div id="airwrap" style="margin-top:8px"></div>
  <div id="airsum" style="margin-top:10px"></div></div>
</div></div>


<div class="modal" id="modal"><div class="mbox">
  <h4 id="mo-title">內容</h4><div class="note" id="mo-note"></div>
  <textarea id="mo-text"></textarea>
  <div class="btnrow" style="margin-top:8px"><button class="btn pri" id="mo-copy">複製</button><button class="btn" id="mo-import" style="display:none">匯入</button><button class="btn" id="mo-close">關閉</button></div>
</div></div>
